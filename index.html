<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNS 홈페이지</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0b0b0b;
    color:white;
}

header{
    height:100vh;
    background:linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,1)),
    url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1400&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

h1{
    font-size:55px;
    margin-bottom:10px;
    color:#ff3b3b;
}

p{
    color:#ccc;
    font-size:18px;
}

.buttons{
    margin-top:30px;
}

.buttons a{
    display:inline-block;
    margin:10px;
    padding:15px 30px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.download{
    background:#e63946;
}

.discord{
    background:#5865F2;
}

.section{
    padding:50px 20px;
    max-width:1000px;
    margin:auto;
}

.card{
    background:#181818;
    padding:25px;
    border-radius:15px;
    margin-top:20px;
}

.online{
    color:#4cff4c;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>BNS PRIVATE SERVER</h1>
    <p>새로운 전장의 시작</p>

    <div class="buttons">
        <a class="download" href="#">게임 다운로드</a>
        <a class="discord" href="#">디스코드</a>
    </div>
</header>

<div class="section">
    <h2>서버 상태</h2>

    <div class="card">
        서버 상태 :
        <span class="online">온라인</span>
    </div>

    <div class="card">
        안정적인 운영 및 지속적인 업데이트 진행중
    </div>
</div>
<section>

<h2>공지사항</h2>
    

<div class="card">
서버 오픈 준비중입니다.
</div>

<div class="card">
디스코드 서버 운영중입니다.
</div>

<div class="card">
1차 테스트 일정 공지 예정입니다.
</div>

<div class="card">
클라이언트 다운로드 준비중입니다.
</div>

<div class="card">
패치노트 및 이벤트 페이지 준비중입니다.
</div>

</section>

</body>
</html>
